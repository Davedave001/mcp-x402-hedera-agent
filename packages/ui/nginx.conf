server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip_static on;

    # Resolve upstream at request time (not startup) via Google DNS
    resolver 8.8.8.8 8.8.4.4 valid=30s ipv6=off;

    location /agent/ {
        set $agent https://api-mcp-x402-hedera-agent.agentikiq.com;
        proxy_pass          $agent$request_uri;
        proxy_http_version  1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host       api-mcp-x402-hedera-agent.agentikiq.com;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
    }

    # Silence the favicon.ico 404 log spam
    location = /favicon.ico {
        return 204;
        access_log off;
        log_not_found off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
