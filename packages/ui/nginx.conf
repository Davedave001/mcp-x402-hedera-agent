server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip_static on;

    # Resolve the agent hostname at request time, not at startup.
    # This lets nginx start even before the upstream DNS is fully propagated.
    resolver 8.8.8.8 8.8.4.4 valid=30s ipv6=off;

    location /agent/ {
        set $agent_host api-mcp-x402-hedera-agent.agentikiq.com;
        proxy_pass          https://$agent_host$request_uri;
        proxy_http_version  1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host       $agent_host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
